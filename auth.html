<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAUGHTER — Врата в бездну</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .email-check-status {
            display: none;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }
        .email-check-status.show {
            display: block;
        }
        .email-check-status.valid {
            background: rgba(0, 139, 0, 0.15);
            border: 1px solid #1a6b1a;
            color: #4a4;
        }
        .email-check-status.invalid {
            background: rgba(139, 0, 0, 0.15);
            border: 1px solid var(--blood);
            color: #a44;
        }
        .email-check-status.checking {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #444;
            color: #aaa;
        }
        .register-success {
            display: none;
            text-align: center;
            animation: cardSlideIn 0.5s ease;
        }
        .register-success.active {
            display: block;
        }
        .success-icon {
            font-size: 60px;
            animation: iconFloat 1s ease;
        }
        @keyframes cardSlideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="auth-page">

    <div class="blood-particles" id="particles"></div>

    <div class="auth-wrapper">
        <div class="ornament-top">† † †</div>
        <h1 class="auth-logo">SLAUGHTER</h1>

        <!-- Карточка ВХОД -->
        <div class="auth-card" id="loginCard">
            <div class="auth-card-header">
                <span class="auth-card-icon">🩸</span>
                <h2>ВХОД В БЕЗДНУ</h2>
            </div>
            <div class="input-group">
                <input type="text" placeholder="Имя пользователя или email" id="loginUser">
                <span class="input-icon">👤</span>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Пароль" id="loginPass">
                <span class="input-icon">🔒</span>
            </div>
            <button class="auth-btn" onclick="handleLogin()">
                <span>ВОЙТИ</span>
            </button>
            <div class="auth-switch">
                Нет аккаунта? <a onclick="switchToRegister()">Продать душу</a>
            </div>
        </div>

        <!-- Карточка РЕГИСТРАЦИЯ -->
        <div class="auth-card" id="registerCard" style="display: none;">
            <!-- Форма регистрации -->
            <div id="registerForm">
                <div class="auth-card-header">
                    <span class="auth-card-icon">📜</span>
                    <h2>РЕГИСТРАЦИЯ ДУШИ</h2>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Придумай имя" id="regUser">
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Твоя почта" id="regEmail" onblur="checkEmailExists()">
                    <span class="input-icon">📧</span>
                </div>
                <div class="email-check-status" id="emailCheckStatus"></div>
                <div class="input-group">
                    <input type="password" placeholder="Пароль (мин. 6 символов)" id="regPass">
                    <span class="input-icon">🔒</span>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Повтори пароль" id="regPassConfirm">
                    <span class="input-icon">🔒</span>
                </div>
                <button class="auth-btn" onclick="handleRegister()">
                    <span>ПРОДАТЬ ДУШУ</span>
                </button>
                <div class="auth-switch">
                    Уже в бездне? <a onclick="switchToLogin()">Войти</a>
                </div>
            </div>

            <!-- Успех -->
            <div class="register-success" id="registerSuccess">
                <div class="success-icon">✅</div>
                <h2 style="color: #4a4; margin: 15px 0; font-family: 'Cinzel', serif;">ДУША ПРИНЯТА</h2>
                <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">
                    Регистрация успешна!<br>Сейчас перенаправим в бездну...
                </p>
            </div>
        </div>

        <div class="auth-footer">Abandon all hope, ye who enter here</div>
    </div>

    <script>
        // ===== ЧАСТИЦЫ =====
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 35; i++) {
            const drop = document.createElement('div');
            drop.classList.add('blood-drop');
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = (Math.random() * 5 + 4) + 's';
            drop.style.animationDelay = Math.random() * 7 + 's';
            drop.style.width = (Math.random() * 5 + 2) + 'px';
            drop.style.height = drop.style.width;
            particlesContainer.appendChild(drop);
        }

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        if (sessionStorage.getItem('slaughter_user')) {
            window.location.href = 'index.html';
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ ФОРМ =====
        function switchToRegister() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('registerCard').style.display = 'block';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerSuccess').classList.remove('active');
            document.getElementById('registerCard').style.animation = 'cardSlideIn 0.5s ease';
            hideEmailStatus();
        }

        function switchToLogin() {
            document.getElementById('registerCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('loginCard').style.animation = 'cardSlideIn 0.5s ease';
            hideEmailStatus();
        }

        // ===== ВХОД =====
        function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!user || !pass) {
                shakeCard('loginCard');
                return;
            }

            // Ищем пользователя по имени или email
            let foundUser = null;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('slaughter_user_')) {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data.pass === pass && (data.user === user || data.email === user)) {
                        foundUser = data;
                        break;
                    }
                }
            }

            if (foundUser) {
                sessionStorage.setItem('slaughter_user', foundUser.user);
                window.location.href = 'index.html';
            } else {
                shakeCard('loginCard');
                document.getElementById('loginPass').value = '';
                alert('Неверное имя пользователя или пароль!');
            }
        }

        // ===== ПРОВЕРКА ПОЧТЫ НА СУЩЕСТВОВАНИЕ =====
        let emailCheckTimeout = null;

        function checkEmailExists() {
            const email = document.getElementById('regEmail').value.trim();
            const statusDiv = document.getElementById('emailCheckStatus');

            // Очищаем предыдущий таймаут
            if (emailCheckTimeout) clearTimeout(emailCheckTimeout);

            if (!email) {
                hideEmailStatus();
                return;
            }

            if (!isValidEmail(email)) {
                showEmailStatus('invalid', '❌ Некорректный формат почты');
                return;
            }

            // Показываем проверку
            showEmailStatus('checking', '⏳ Проверяем почту...');

            // Задержка чтобы не спамить при вводе
            emailCheckTimeout = setTimeout(() => {
                // Проверяем формат (более строгая проверка)
                if (!isValidEmailStrict(email)) {
                    showEmailStatus('invalid', '❌ Такая почта не может существовать');
                    return;
                }

                // Проверяем не занята ли почта
                let emailExists = false;
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('slaughter_user_')) {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.email === email) {
                            emailExists = true;
                            break;
                        }
                    }
                }

                if (emailExists) {
                    showEmailStatus('invalid', '❌ Эта почта уже используется');
                } else {
                    showEmailStatus('valid', '✅ Почта подтверждена');
                }
            }, 600);
        }

        function showEmailStatus(type, message) {
            const statusDiv = document.getElementById('emailCheckStatus');
            statusDiv.className = 'email-check-status show ' + type;
            statusDiv.textContent = message;
        }

        function hideEmailStatus() {
            const statusDiv = document.getElementById('emailCheckStatus');
            statusDiv.className = 'email-check-status';
            statusDiv.textContent = '';
        }

        // ===== РЕГИСТРАЦИЯ =====
        function handleRegister() {
            const user = document.getElementById('regUser').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const passConfirm = document.getElementById('regPassConfirm').value.trim();

            if (!user || !email || !pass || !passConfirm) {
                shakeCard('registerCard');
                alert('Заполни все поля!');
                return;
            }

            if (!isValidEmail(email)) {
                shakeCard('registerCard');
                alert('Введи правильную почту!');
                return;
            }

            if (pass !== passConfirm) {
                shakeCard('registerCard');
                alert('Пароли не совпадают!');
                return;
            }

            if (pass.length < 6) {
                shakeCard('registerCard');
                alert('Пароль должен быть не менее 6 символов!');
                return;
            }

            // Проверяем не занята ли почта
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('slaughter_user_')) {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data.email === email) {
                        alert('Эта почта уже используется!');
                        return;
                    }
                    if (data.user === user) {
                        alert('Это имя уже занято!');
                        return;
                    }
                }
            }

            // Сохраняем пользователя
            const userData = { user, email, pass, registeredAt: new Date().toISOString() };
            localStorage.setItem('slaughter_user_' + user, JSON.stringify(userData));
            sessionStorage.setItem('slaughter_user', user);

            // Показываем успех
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('registerSuccess').classList.add('active');

            // Редирект
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function isValidEmailStrict(email) {
            // Проверяем что домен выглядит реальным
            const domain = email.split('@')[1];
            if (!domain) return false;

            // Запрещаем временные почты
            const tempDomains = [
                'tempmail', 'temp-mail', 'guerrillamail', '10minutemail', 'throwaway',
                'mailinator', 'yopmail', 'sharklasers', 'trashmail', 'dispostable'
            ];

            for (const td of tempDomains) {
                if (domain.includes(td)) return false;
            }

            // Проверяем что домен содержит точку и минимум 2 символа в TLD
            const parts = domain.split('.');
            if (parts.length < 2) return false;
            if (parts[parts.length - 1].length < 2) return false;

            return true;
        }

        function shakeCard(id) {
            const card = document.getElementById(id);
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'shake 0.5s ease';
            setTimeout(() => card.style.animation = '', 500);
        }

        // ===== ENTER =====
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginCard = document.getElementById('loginCard');
                if (loginCard.style.display !== 'none') {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });
    </script>
</body>
</html>
